name: Fetch and Update Cookies

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and parse data
        run: |
          # Fetch the data with a real browser User-Agent to prevent bot blocking
          curl -s -L -k -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json" -o raw.json
          
          # Verify the API returned valid JSON before processing
          if jq -e . raw.json >/dev/null 2>&1; then
            jq '[
              .failed_results[]? | {
                channel_name: (.channel_name // "Unknown"),
                cookie: (if .error_details.final_url then (.error_details.final_url | split("?")[1] // "N/A") else "N/A" end)
              }
            ]' raw.json > cookies.json
            echo "Successfully updated cookies.json"
          else
            echo "Failed to get valid JSON from server. Keeping the existing file to prevent an empty file."
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update extracted tokens"
          file_pattern: cookies.json
