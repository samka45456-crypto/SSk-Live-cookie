name: Fetch and Update Cookies

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process JSON with Python
        run: |
          cat << 'EOF' > process.py
          import json, urllib.request, urllib.parse, sys

          url = 'https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json'
          # Using a strong User-Agent to bypass basic server blocking
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
              
              result = []
              for item in data.get('failed_results', []):
                  name = item.get('channel_name', 'Unknown')
                  
                  # Keep the list clean
                  if 'super hungama' in name.lower():
                      continue
                      
                  url_str = item.get('error_details', {}).get('final_url', '')
                  cookie_val = 'N/A'
                  
                  if url_str:
                      parsed = urllib.parse.urlparse(url_str)
                      if parsed.query:
                          # Extracts everything after the '?' just like parse_url($fullUrl, PHP_URL_QUERY)
                          cookie_val = parsed.query
                          
                  result.append({
                      'channel_name': name,
                      'cookie': cookie_val
                  })
              
              with open('cookies.json', 'w') as f:
                  json.dump(result, f, indent=4)
                  
              print("Successfully processed and created cookies.json")
              
          except Exception as e:
              print(f"Error fetching or parsing data: {e}")
              sys.exit(1)
          EOF
          python3 process.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update extracted tokens"
          file_pattern: cookies.json
