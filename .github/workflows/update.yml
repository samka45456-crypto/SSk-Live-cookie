name: update

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: checkout
        uses: actions/checkout@v4
      
      - name: process
        run: |
          python3 -c "
          import json, urllib.request, urllib.parse
          url = 'https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
              out = [{'channel_name': i.get('channel_name'), 'cookie': urllib.parse.urlparse(i.get('error_details',{}).get('final_url','')).query or 'N/A'} for i in data.get('failed_results', []) if 'super hungama' not in i.get('channel_name', '').lower()]
              with open('cookies.json', 'w') as f: json.dump(out, f, indent=4)
          except Exception as e: print(e)
          "

      - name: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update"
          file_pattern: cookies.json
